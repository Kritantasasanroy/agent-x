name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (light test deps)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn "pydantic>=2" pydantic-settings "passlib[bcrypt]" \
            "bcrypt<4.1" pyjwt cryptography "sqlalchemy>=2" celery redis httpx tenacity \
            python-docx reportlab prometheus-client structlog email-validator \
            python-multipart pytest ruff
      - name: Lint
        run: ruff check app || true
      - name: Test
        env:
          JWT_SECRET: ci-secret-ci-secret-ci-secret
          LLM_PROVIDER: ollama
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose config -q
      - name: Build HF Spaces image
        run: docker build -t jobhunter-spaces .
